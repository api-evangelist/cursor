naftiko: 1.0.0-alpha2
info:
  label: Cursor Admin API — Members
  description: 'Cursor Admin API — Members. 2 operations. Lead operation: Get team members. Self-contained Naftiko capability
    covering one Cursor business surface.'
  tags:
  - Cursor
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CURSOR_API_KEY: CURSOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-members
    baseUri: https://api.cursor.com
    description: Cursor Admin API — Members business capability. Self-contained, no shared references.
    resources:
    - name: teams-members
      path: /teams/members
      operations:
      - name: getteammembers
        method: GET
        description: Get team members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams-remove-member
      path: /teams/remove-member
      operations:
      - name: removeteammember
        method: POST
        description: Remove team member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CURSOR_USER}}'
      password: '{{env.CURSOR_PASS}}'
  exposes:
  - type: rest
    namespace: admin-members-rest
    port: 8080
    description: REST adapter for Cursor Admin API — Members. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams/members
      name: teams-members
      description: REST surface for teams-members.
      operations:
      - method: GET
        name: getteammembers
        description: Get team members
        call: admin-members.getteammembers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/remove-member
      name: teams-remove-member
      description: REST surface for teams-remove-member.
      operations:
      - method: POST
        name: removeteammember
        description: Remove team member
        call: admin-members.removeteammember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cursor Admin API — Members. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-team-members
      description: Get team members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-members.getteammembers
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-team-member
      description: Remove team member
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-members.removeteammember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
