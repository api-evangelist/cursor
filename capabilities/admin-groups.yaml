    namespace: admin-groups
    baseUri: https://api.cursor.com
    description: Cursor Admin API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: teams-groups
      path: /teams/groups
      operations:
      - name: listgroups
        method: GET
        description: List billing groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creategroup
        method: POST
        description: Create billing group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: teams-groups-groupId
      path: /teams/groups/{groupId}
      operations:
      - name: getgroup
        method: GET
        description: Get billing group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updategroup
        method: PATCH
        description: Update billing group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletegroup
        method: DELETE
        description: Delete billing group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams-groups-groupId-members
      path: /teams/groups/{groupId}/members
      operations:
      - name: addgroupmembers
        method: POST
        description: Add members to group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removegroupmembers
        method: DELETE
        description: Remove members from group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CURSOR_USER}}'
      password: '{{env.CURSOR_PASS}}'
  exposes:
  - type: rest
    namespace: admin-groups-rest
    port: 8080
    description: REST adapter for Cursor Admin API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/teams/groups
      name: teams-groups
      description: REST surface for teams-groups.
      operations:
      - method: GET
        name: listgroups
        description: List billing groups
        call: admin-groups.listgroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Create billing group
        call: admin-groups.creategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/groups/{groupid}
      name: teams-groups-groupid
      description: REST surface for teams-groups-groupId.
      operations:
      - method: GET
        name: getgroup
        description: Get billing group
        call: admin-groups.getgroup
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updategroup
        description: Update billing group
        call: admin-groups.updategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletegroup
