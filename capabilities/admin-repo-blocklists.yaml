naftiko: 1.0.0-alpha2
info:
  label: Cursor Admin API — Repo Blocklists
  description: 'Cursor Admin API — Repo Blocklists. 3 operations. Lead operation: Get repo blocklists. Self-contained Naftiko
    capability covering one Cursor business surface.'
  tags:
  - Cursor
  - Repo Blocklists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CURSOR_API_KEY: CURSOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-repo-blocklists
    baseUri: https://api.cursor.com
    description: Cursor Admin API — Repo Blocklists business capability. Self-contained, no shared references.
    resources:
    - name: settings-repo-blocklists-repos
      path: /settings/repo-blocklists/repos
      operations:
      - name: getrepoblocklists
        method: GET
        description: Get repo blocklists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: settings-repo-blocklists-repos-upsert
      path: /settings/repo-blocklists/repos/upsert
      operations:
      - name: upsertrepoblocklists
        method: POST
        description: Upsert repo blocklists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: settings-repo-blocklists-repos-repoId
      path: /settings/repo-blocklists/repos/{repoId}
      operations:
      - name: deleterepoblocklist
        method: DELETE
        description: Remove repo from blocklist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repoId
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.CURSOR_USER}}'
      password: '{{env.CURSOR_PASS}}'
  exposes:
  - type: rest
    namespace: admin-repo-blocklists-rest
    port: 8080
    description: REST adapter for Cursor Admin API — Repo Blocklists. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/repo-blocklists/repos
      name: settings-repo-blocklists-repos
      description: REST surface for settings-repo-blocklists-repos.
      operations:
      - method: GET
        name: getrepoblocklists
        description: Get repo blocklists
        call: admin-repo-blocklists.getrepoblocklists
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/settings/repo-blocklists/repos/upsert
      name: settings-repo-blocklists-repos-upsert
      description: REST surface for settings-repo-blocklists-repos-upsert.
      operations:
      - method: POST
        name: upsertrepoblocklists
        description: Upsert repo blocklists
        call: admin-repo-blocklists.upsertrepoblocklists
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/settings/repo-blocklists/repos/{repoid}
      name: settings-repo-blocklists-repos-repoid
      description: REST surface for settings-repo-blocklists-repos-repoId.
      operations:
      - method: DELETE
        name: deleterepoblocklist
        description: Remove repo from blocklist
        call: admin-repo-blocklists.deleterepoblocklist
        with:
          repoId: rest.repoId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-repo-blocklists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cursor Admin API — Repo Blocklists. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-repo-blocklists
      description: Get repo blocklists
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-repo-blocklists.getrepoblocklists
      outputParameters:
      - type: object
        mapping: $.
    - name: upsert-repo-blocklists
      description: Upsert repo blocklists
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-repo-blocklists.upsertrepoblocklists
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-repo-blocklist
      description: Remove repo from blocklist
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-repo-blocklists.deleterepoblocklist
      with:
        repoId: tools.repoId
      outputParameters:
      - type: object
        mapping: $.
