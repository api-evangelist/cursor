apis:
  - aid: cursor:admin-api
    name: Cursor Admin API
    description: >-
      The Cursor Admin API allows team and enterprise administrators to programmatically
      manage members, billing groups, audit logs, daily usage data, spending, repository
      indexing blocklists, and per-user spend limits. Authentication uses HTTP Basic
      Authentication with the API key as the username.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cursor.com/docs/account/teams/admin-api
