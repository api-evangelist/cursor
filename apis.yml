aid: cursor
name: Cursor
description: >-
  Cursor is an AI-powered code editor built on a fork of Visual Studio Code, designed
  to make developers extraordinarily productive by deeply integrating large language
  models into the editing, navigation, refactoring, and chat experience. In addition
  to its consumer and team plans, Cursor exposes an Admin API for enterprise customers
  to programmatically manage team members, billing groups, audit logs, daily usage
  data, spending, repo indexing blocklists, and per-user spend limits.
