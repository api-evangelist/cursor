aid: cursor
url: https://raw.githubusercontent.com/api-evangelist/cursor/refs/heads/main/apis.yml
name: Cursor
x-type: company
description: >-
  Cursor is an AI-first code editor by Anysphere, forked from VS Code, with deep AI
  integration: agentic edits, codebase chat, autocomplete, and tab-completion. Offers
  a hosted plan with model access and team management. Cursor exposes a public Admin
  API, Analytics API, AI Code Tracking API, Cloud Agents API, and a TypeScript SDK.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Developer Tools
  - Code Editor
  - Agent
  - IDE
  - Cloud Agents
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: cursor:admin
    name: Cursor Admin API
    description: >-
      Programmatic access to team data: members, usage metrics, spending, repository
      blocklists, daily/filtered usage events. Available to Enterprise teams. Uses HTTP
      Basic auth with API key as username.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cursor.com/docs/account/teams/admin-api
    baseURL: https://api.cursor.com
    tags:
      - Admin
      - Teams
      - Usage
      - Billing
    properties:
      - type: Documentation
        url: https://cursor.com/docs/account/teams/admin-api
      - type: APIIndex
        url: https://cursor.com/docs/api
  - aid: cursor:analytics
    name: Cursor Analytics API
    description: Usage insights, AI metrics, and model usage stats for Enterprise teams.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
